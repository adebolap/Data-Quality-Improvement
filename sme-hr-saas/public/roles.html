<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PeopleBase - Role Templates</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="logo">PeopleBase</div>
    <nav>
      <a href="/"><span class="icon">&#9632;</span> Dashboard</a>
      <a href="/pipeline"><span class="icon">&#9654;</span> Pipeline</a>
      <a href="/employees"><span class="icon">&#9787;</span> Employees</a>
      <a href="/leave"><span class="icon">&#9992;</span> Leave</a>
      <a href="/roles" class="active"><span class="icon">&#9998;</span> Roles</a>
    </nav>
  </aside>

  <div class="main">
    <div class="page-header">
      <h1>Role Templates</h1>
      <button class="btn btn-primary" onclick="showAddRoleModal()">+ New Role</button>
    </div>

    <p style="color:var(--gray-500);margin-bottom:20px;font-size:14px">Define role profiles once — AI uses them to screen CVs, generate job descriptions, and write offer letters tailored to each position.</p>

    <div id="roles-grid" class="stats" style="grid-template-columns:repeat(auto-fill,minmax(300px,1fr))">
      <!-- Roles loaded dynamically -->
    </div>
  </div>
</div>
<div class="mobile-nav">
  <nav>
    <a href="/"><span class="icon">&#9632;</span>Home</a>
    <a href="/pipeline"><span class="icon">&#9654;</span>Pipeline</a>
    <a href="/employees"><span class="icon">&#9787;</span>Team</a>
    <a href="/roles" class="active"><span class="icon">&#9998;</span>Roles</a>
  </nav>
</div>
<script src="/js/app.js"></script>
<script src="/js/roles.js"></script>
</body>
</html>
